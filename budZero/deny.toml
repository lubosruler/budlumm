# budZero/deny.toml — BudZero/BudZKVM supply-chain kapısı (Phase 8.2 / Faz 1)
#
# Kökteli deny.toml ile aynı politika; BudZero grafiği kendi matrix adımında
# denetlenir. Şema cargo-deny 0.20+'a güncellendi (eski anahtarlar kaldırıldı;
# davranış birebir korundu: allow dışı lisans = FAIL, bilinmeyen kaynak = FAIL).

[graph]
targets = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "CC0-1.0",
    "ISC",
    "OpenSSL",
    "Zlib",
    # Kökle aynı gerekçe: bud-node → libp2p → idna_adapter zinciri icu_*
    # crate'lerini getirir; Unicode-3.0 OSI-onaylı permissive lisanstır.
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[advisories]
# Kökle aynı politika (gerekçeler ../../deny.toml'da ayrıntılı):
# unmaintained → fail değil (cargo audit uyarılarıyla görünür kalır),
# unsound → doğrudan bağımlılıkta FAIL (sıkı).
unmaintained = "none"
unsound = "workspace"
ignore = [
    { id = "RUSTSEC-2026-0118", reason = "HTTP/DNSSEC yolu kodda kullanılmaz (grep: DnssecDnsHandle|dnssec = 0 eşleşme); libp2p-mdns DNSSEC doğrulamaz → ulaşılamaz. Yükseltme libp2p 0.55 hattında imkânsız (libp2p-mdns ^0.25.0-alpha.4 pini). Ayrıntı: ../../deny.toml" },
    { id = "RUSTSEC-2026-0119", reason = "Tetikleme saldırganın aynı L2 multicast domain'inde olmasını gerektirir; mainnet/testnet config'inde mdns_enabled=false. Etki LAN-komşuluğu DoS. libp2p yükseltmesiyle kapanacak. Ayrıntı: ../../deny.toml" },
]
