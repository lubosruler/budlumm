[network]
profile = "devnet"
chain_id = 1337
genesis_file = "./config/devnet-genesis.json"

[node]
role = "validator"

[storage]
data_dir = "./data/devnet/budlum.db"
snapshot_dir = "./data/devnet/snapshots"
backup_dir = "./data/devnet/backups"
backups_enabled = false
backup_interval_secs = 3600
backup_retention_count = 24

[p2p]
identity_file = "./secrets/devnet-node-id.key"
bootnodes = []
dns_seeds = []
max_peers = 25
banned_peer_db = "./data/devnet/banned-peers.json"
mdns_enabled = true

[rpc]
public_listener = "127.0.0.1:8545"
operator_listener = "127.0.0.1:8546"
trusted_proxies = ["127.0.0.1"]
enabled = true

[metrics]
listener = "127.0.0.1:9090"

[validator]
key_file = "./secrets/devnet-validator.key"
backend = "local"

[features]
governance = false
zkvm_contracts = false
pruning = false
