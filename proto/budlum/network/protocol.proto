syntax = "proto3";

package budlum.network;

enum ProtoTransactionType {
    TRANSFER = 0;
    STAKE = 1;
    UNSTAKE = 2;
    VOTE = 3;
    CONTRACT_CALL = 4;
    BNS_REGISTER = 5;
    BNS_SET_CONTENT = 6;
    BNS_REGISTER_SUBDOMAIN = 7;
    BNS_SET_STORAGE = 8;
    NFT_MINT = 9;
    NFT_TRANSFER = 10;
    NFT_BURN = 11;
    NFT_BOOST = 12;
    NFT_UPDATE_LIGHT = 13;
    NFT_TAG = 14;
    UNIVERSAL_RELAY = 15;
    RELAYER_RESULT = 16;
    AI_OFFER_DATA = 17;
    AI_PURCHASE_DATA = 18;
    HUB_REGISTER_APP = 19;
    AI_MODEL_REGISTER = 20;
    AI_INFERENCE_REQUEST = 21;
    AI_INFERENCE_RESULT = 22;
    AI_FEE_RECLAIM = 23;
    AI_MODEL_DEACTIVATE = 24;
    AI_MODEL_REACTIVATE = 25;
    AI_REQUEST_CANCEL = 26;
    AI_DISPUTE_SLASH = 27;
    AI_AGENT_PAYMENT = 28;
    AI_AGENT_PAYMENT_RELEASE = 29;
    AI_AGENT_PAYMENT_RECLAIM = 30;
}

message ProtoTransaction {
    string from = 1;
    string to = 2;
    uint64 amount = 3;
    uint64 fee = 4;
    uint64 nonce = 5;
    bytes data = 6;
    string timestamp = 7; 
    string hash = 8;
    bytes signature = 9;
    uint64 chain_id = 10;
    ProtoTransactionType tx_type = 11;
    uint32 wire_version = 12;
    uint32 signature_version = 13;
    oneof type_payload {
        ProtoNftBoost nft_boost = 20;
        ProtoNftUpdateLight nft_update_light = 21;
        ProtoNftTag nft_tag = 22;
        ProtoUniversalRelay universal_relay = 23;
        ProtoRelayerResult relayer_result = 24;
        ProtoAiOfferData ai_offer_data = 25;
        ProtoAiPurchaseData ai_purchase_data = 26;
        ProtoHubRegisterApp hub_register_app = 27;
        ProtoAiModelRegister ai_model_register = 28;
        ProtoAiInferenceRequest ai_inference_request = 29;
        ProtoAiInferenceResult ai_inference_result = 30;
        ProtoAiFeeReclaim ai_fee_reclaim = 31;
        ProtoAiModelDeactivate ai_model_deactivate = 32;
        ProtoAiModelDeactivate ai_model_reactivate = 33;
        ProtoAiFeeReclaim ai_request_cancel = 34;
        ProtoAiDisputeSlash ai_dispute_slash = 35;
        // V116 fix: dedicated proto types for AiAgentPayment variants.
        // Previously these all mapped to AiFeeReclaim (type collision).
        ProtoAiAgentPayment ai_agent_payment = 36;
        ProtoAiAgentPaymentRelease ai_agent_payment_release = 37;
        ProtoAiAgentPaymentReclaim ai_agent_payment_reclaim = 38;
    }
}

message ProtoNftBoost {
    uint64 nft_id = 1;
    uint64 amount = 2;
}

message ProtoNftUpdateLight {
    uint64 nft_id = 1;
    int64 delta_mcd = 2;
}

message ProtoNftTag {
    uint64 nft_id = 1;
    string tag = 2;
}

message ProtoExternalChain {
    enum ChainType {
        ETHEREUM = 0;
        SOLANA = 1;
        BITCOIN = 2;
        AVALANCHE = 3;
        POLYGON = 4;
        ARBITRUM = 5;
        OPTIMISM = 6;
        CUSTOM = 7;
    }
    ChainType chain_type = 1;
    uint32 custom_id = 2;
}

message ProtoUniversalRelay {
    ProtoExternalChain chain = 1;
    string target_address = 2;
    bytes payload = 3;
    uint64 external_nonce = 4;
}

message ProtoMessageKind {
    enum KindType {
        BRIDGE_LOCK = 0;
        BRIDGE_MINT = 1;
        BRIDGE_BURN = 2;
        BRIDGE_UNLOCK = 3;
        CUSTOM = 4;
    }
    KindType kind_type = 1;
    bytes custom_bytes = 2;
}

message ProtoCrossDomainMessagePayload {
    string message_id = 1;
    string correlation_id = 2;
    string source_domain = 3;
    string target_domain = 4;
    uint64 source_height = 5;
    uint32 event_index = 6;
    uint64 nonce = 7;
    string sender = 8;
    string recipient = 9;
    string payload_hash = 10;
    ProtoMessageKind kind = 11;
    uint64 expiry_height = 12;
}

message ProtoRelayerResult {
    ProtoExternalChain chain = 1;
    string tx_hash = 2;
    bool success = 3;
    ProtoCrossDomainMessagePayload message = 4;
    bytes receipt_proof = 5;
    bytes external_state_root = 6;
}

message ProtoAiOfferData {
    bytes cid = 1;
    uint64 price = 2;
}

message ProtoAiPurchaseData {
    uint64 offer_id = 1;
}

message ProtoHubRegisterApp {
    string name = 1;
    enum AppCategoryProto {
        SOCIAL_FI = 0;
        DE_FI = 1;
        STORAGE = 2;
        GAMING = 3;
        INFRASTRUCTURE = 4;
        OTHER = 5;
    }
    AppCategoryProto category = 2;
    string website_url = 3;
    bytes manifest_id = 4;
}

message ProtoAiModelRegister {
    bytes model_id = 1;
    bytes model_hash = 2;
    string owner = 3;
    uint32 min_verifier_count = 4;
    uint32 agreement_threshold = 5;
    uint64 max_input_ref_bytes = 6;
    uint64 max_output_ref_bytes = 7;
    uint64 request_deadline_blocks = 8;
    uint64 result_deadline_blocks = 9;
    uint32 version = 10;
    bool active = 11;
}

message ProtoAiInferenceRequest {
    bytes request_id = 1;
    string requester = 2;
    bytes model_id = 3;
    bytes input_commitment = 4;
    bytes input_ref = 5;
    uint64 max_fee = 6;
    string callback = 7;
    uint64 submitted_at_block = 8;
    uint64 deadline_block = 9;
}

message ProtoAiInferenceResult {
    bytes request_id = 1;
    string verifier = 2;
    bytes output_commitment = 3;
    bytes output_ref = 4;
    uint64 result_nonce = 5;
    bytes signature = 6;
    uint64 submitted_at_block = 7;
}

message ProtoSlashingEvidence {
    ProtoBlockHeader header1 = 1;
    ProtoBlockHeader header2 = 2;
    bytes signature1 = 3;
    bytes signature2 = 4;
}

message ProtoBlockHeader {
    uint64 index = 1;
    string timestamp = 2; 
    string previous_hash = 3;
    string hash = 4;
    string producer = 5;
    uint64 chain_id = 6;
    string state_root = 7;
    string tx_root = 8;
    repeated ProtoSlashingEvidence slashing_evidence = 9;
    uint64 nonce = 10;
    uint64 epoch = 11;
    uint64 slot = 12;
    bytes vrf_output = 13;
    bytes vrf_proof = 14;
    string validator_set_hash = 15;
}

message ProtoBlock {
    uint64 index = 1;
    string timestamp = 2; 
    string previous_hash = 3;
    string hash = 4;
    repeated ProtoTransaction transactions = 5;
    uint64 nonce = 6;
    string producer = 7;
    bytes signature = 8;
    uint64 chain_id = 10;
    repeated ProtoSlashingEvidence slashing_evidence = 11;
    string state_root = 12;
    string tx_root = 13;
    uint64 epoch = 14;
    uint64 slot = 15;
    bytes vrf_output = 16;
    bytes vrf_proof = 17;
    string validator_set_hash = 18;
}

message ProtoNetworkMessage {
    oneof payload {
        ProtoHandshake handshake = 1;
        ProtoHandshakeAck handshake_ack = 2;
        ProtoBlock block = 3;
        ProtoTransaction transaction = 4;
        ProtoGetHeaders get_headers = 5;
        ProtoHeaders headers = 6;
        ProtoGetBlocksRange get_blocks_range = 7;
        ProtoBlocks blocks = 8;
        ProtoGetBlocksByHeight get_blocks_by_height = 9;
        ProtoBlocksByHeight blocks_by_height = 10;
        ProtoStateSnapshotResponse state_snapshot_response = 11;
        ProtoNewTip new_tip = 12;
        ProtoGetStateSnapshot get_state_snapshot = 13;
        ProtoSnapshotChunk snapshot_chunk = 14;
        ProtoPrevote prevote = 15;
        ProtoPrecommit precommit = 16;
        ProtoFinalityCert finality_cert = 17;
        ProtoGetQcBlob get_qc_blob = 18;
        ProtoQcBlobResponse qc_blob_response = 19;
        ProtoQcFaultProof qc_fault_proof = 20;
        ProtoDomainCommitment domain_commitment = 21;
        ProtoGlobalHeader global_header = 22;
        ProtoCrossDomainMessage cross_domain_message = 23;
        ProtoVerifiedDomainCommitment verified_domain_commitment = 24;
        ProtoSlashingEvidence slashing_evidence = 25;
    }
}

message ProtoHandshake {
    uint32 version_major = 1;
    uint32 version_minor = 2;
    uint64 chain_id = 3;
    uint64 best_height = 4;
    string validator_set_hash = 5;
    repeated string supported_schemes = 6;
}

message ProtoHandshakeAck {
    uint32 version_major = 1;
    uint32 version_minor = 2;
    uint64 chain_id = 3;
    uint64 best_height = 4;
    string validator_set_hash = 5;
    repeated string supported_schemes = 6;
}

message ProtoGetHeaders {
    repeated string locator = 1;
    uint32 limit = 2;
}

message ProtoHeaders {
    repeated ProtoBlockHeader headers = 1;
}

message ProtoGetBlocksRange {
    uint64 from_index = 1; 
    uint64 to_index = 2;
}

message ProtoBlocks {
    repeated ProtoBlock blocks = 1;
}

message ProtoGetBlocksByHeight {
    uint64 from_height = 1;
    uint64 to_height = 2;
}

message ProtoBlocksByHeight {
    repeated ProtoBlock blocks = 1;
}

message ProtoStateSnapshotResponse {
    uint64 height = 1;
    string state_root = 2;
    bool ok = 3;
}

message ProtoNewTip {
    uint64 height = 1;
    string hash = 2;
}

message ProtoGetStateSnapshot {
    uint64 height = 1;
}

message ProtoSnapshotChunk {
    uint64 height = 1;
    uint32 index = 2;
    uint32 total = 3;
    bytes data = 4;
    uint64 session_id = 5;
}

message ProtoPrevote {
    uint64 epoch = 1;
    uint64 checkpoint_height = 2;
    string checkpoint_hash = 3;
    string voter_id = 4;
    bytes sig_bls = 5;
}

message ProtoPrecommit {
    uint64 epoch = 1;
    uint64 checkpoint_height = 2;
    string checkpoint_hash = 3;
    string voter_id = 4;
    bytes sig_bls = 5;
}

message ProtoFinalityCert {
    uint64 epoch = 1;
    uint64 checkpoint_height = 2;
    string checkpoint_hash = 3;
    bytes agg_sig_bls = 4;
    bytes bitmap = 5;
    string set_hash = 6;
}

message ProtoGetQcBlob {
    uint64 epoch = 1;
    uint64 checkpoint_height = 2;
}

message ProtoQcBlobResponse {
    uint64 epoch = 1;
    uint64 checkpoint_height = 2;
    string checkpoint_hash = 3;
    bytes blob_data = 4;
    bool found = 5;
}

message ProtoQcFaultProof {
    bytes proof_data = 1;
}

message ProtoDomainCommitment {
    bytes data = 1;
}

message ProtoVerifiedDomainCommitment {
    bytes data = 1;
}

message ProtoGlobalHeader {
    bytes data = 1;
}

message ProtoCrossDomainMessage {
    bytes data = 1;
}

message ProtoAiFeeReclaim {
    bytes request_id = 1;
}

message ProtoAiModelDeactivate {
    bytes model_id = 1;
}

message ProtoAiDisputeSlash {
    bytes request_id = 1;
    bytes verifier = 2;
}

// V116 fix: dedicated proto types for AiAgentPayment variants.
// Previously these all mapped to AiFeeReclaim (type collision),
// making them impossible to decode on the receiving side.

message ProtoAiAgentPayment {
    bytes payment_id = 1;
    bytes from_agent = 2;
    bytes to_agent = 3;
    uint64 amount = 4;
    bytes request_id = 5;
    bool require_proof = 6;
    uint64 submitted_at_block = 7;
    uint64 expiry_block = 8;
}

message ProtoAiAgentPaymentRelease {
    bytes payment_id = 1;
}

message ProtoAiAgentPaymentReclaim {
    bytes payment_id = 1;
}
