name: Supply Chain Extra (G3 udeps + G11 geiger)

on:
  push:
    branches: [ main ]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'budzero/Cargo.toml'
      - 'budzero/Cargo.lock'
      - 'src/**'
      - 'budzero/**'
      - '.github/workflows/supply-chain-extra.yml'
      - '.github/udeps-baseline.txt'
  schedule:
    # Haftalık hijyen taraması (cargo update etkileri + yeni dep'ler)
    - cron: '17 4 * * 1'
  workflow_dispatch:

# G5: yalnız okur.
permissions:
  contents: read

jobs:
  udeps:
    name: Udeps — kullanılmayan bağımlılık kapısı (G3/ADIM8 §3.3)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # G3: udeps nightly-gerektirir (rustc private API); kurulum + çalıştırma aynı nightly'de.
      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - name: cargo-udeps kur (locked; crate.io sürümü log'da kanıtlı)
        run: cargo +nightly install cargo-udeps --locked
      - name: Kanarya (vacuous-gate koruması)
        run: bash ./scripts/check-udeps.sh --self-test
      - name: "Ölçüm + kapı (ratchet: baseline dışı bulgu = FAIL)"
        run: |
          ROOT="$PWD"
          cargo +nightly udeps --all-targets 2>&1 | tee /tmp/udeps1.txt || true
          bash "$ROOT/scripts/check-udeps.sh" /tmp/udeps1.txt
          cd budzero
          cargo +nightly udeps --all-targets 2>&1 | tee /tmp/udeps2.txt || true
          bash "$ROOT/scripts/check-udeps.sh" /tmp/udeps2.txt

  geiger:
    name: "Geiger — unsafe görünürlük (G11; first-party 0 kanıt katmanı)"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - name: cargo-geiger kur (locked; crate.io sürümü log'da kanıtlı)
        run: cargo install cargo-geiger --locked
      - name: Kanarya (vacuous-gate koruması)
        run: bash ./scripts/check-geiger.sh --self-test
      - name: Ölçüm + first-party kapısı (budlum + budzero)
        run: |
          ROOT="$PWD"
          cargo geiger --all-targets 2>&1 | tee /tmp/geiger1.txt || true
          bash "$ROOT/scripts/check-geiger.sh" /tmp/geiger1.txt
          cd budzero
          cargo geiger --all-targets 2>&1 | tee /tmp/geiger2.txt || true
          bash "$ROOT/scripts/check-geiger.sh" /tmp/geiger2.txt
