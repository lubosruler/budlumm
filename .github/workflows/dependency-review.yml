name: Dependency Review (PR güvenlik kapısı)

# Bu kapı, her pull_request'te PR diff'inde yeni tanıtılan bağımlılıkların
# bilinen zaafiyet/lisans sorunları için GitHub Advisory veritabanına göre
# denetlenmesini sağlar. cargo-audit / cargo-deny TÜM bağımlılık ağacını
# tararken, bu kapı yalnızca PR'ın getirdiği DELTAYA odaklanır — yani bir PR
# bilinen zaafiyetli bir sürüm eklemeye çalışırsa (dependabot dahil) main'e
# merge olmadan RED edilir. Tamamlayıcı, tekrarlamaz.

on:
  pull_request:
    branches: [main]

# G5: salt-okur.
permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review (GH Advisory, PR diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # PR diff'inde tanıtılan moderate+ zaafiyetli bağımlılık → fail.
          # (low = yalnızca uyarı; high/critical çok geç kalır; moderate denge.)
          fail-on-severity: moderate
          # Lisans reddi listesi deny.toml [licenses] içinde yönetilir; burada
          # yalnızca advisory odaklı. comment-summary-in-pr opsiyonel.
          comment-summary-in-pr: always
