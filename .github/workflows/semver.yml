name: Semver Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  semver-check:
    # CI Genişletme Madde 5: cargo-semver-checks — public API kırılması tespiti.
    #
    # ADIM-1 sertleştirmesi (ARENA2, 2026-07-21): eski sürüm her iki adımda da
    # `continue-on-error: true` idi → kapı ASLA kırmızı veremiyordu (gözlem
    # modu = süsleme). Ayrıca base mekanizması yoktu: `check-release`
    # crates.io'ya yayınlanmamış `budlum-core` için çalışamaz. Yeni model:
    #   * Base = PR'da `pull_request.base.sha`, main push'ta `push.before`.
    #   * İki ayrı checkout (current/baseline) + `--baseline-root`.
    #   * nightly toolchain (cargo-semver-checks rustdoc-json üretimi için).
    #   * Gate: `scripts/check-semver.sh` — kırılma varsa ve
    #     `.github/semver-exceptions.txt` boşsa FAIL. İstisna satırları
    #     kullanıcı onaylı, gerekçeli "kanıtlı skip-list" desenindedir
    #     (deny.toml [advisories] ile aynı disiplin).
    name: Semver Check (Madde 5 — public API breakage gate)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout (current)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: current
          persist-credentials: false
      - name: Checkout (baseline = merge base)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: baseline
          ref: ${{ github.event.pull_request.base.sha || github.event.before }}
          persist-credentials: false
      - name: Install Rust (stable pin)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: "1.94.0"
      - name: Install nightly (rustdoc-json backend for semver-checks)
        run: rustup toolchain install nightly --profile minimal
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # İki-checkout yerleşiminde workspace kökünde Cargo.toml yok;
          # rust-cache'in `cargo metadata` çağrısı kökte patlar (Error logu).
          workspaces: ./current
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - name: cargo-semver-checks kur (locked)
        run: cargo +1.94.0 install cargo-semver-checks --locked
      - name: Gate canary (vacuous-gate koruması)
        run: bash ./current/scripts/check-semver.sh --self-test
      - name: Semver gate — budlum-core vs baseline
        env:
          SEMVER_BEFORE: ${{ github.event.pull_request.base.sha || github.event.before }}
          # Kök-neden analizi (üçüncü koşu kanıtı): rustdoc-json üretimi,
          # bağımlılıkların DERLENMESİ tamamlandıktan sonra, crate'in kendi
          # rustdoc-json adımında ölüyordu ve memory snapshot 9.7GB boş
          # gösteriyordu (OOM tezi çürütüldü). Neden: `rust-toolchain.toml`
          # (channel=1.94.0) araç zinciri seçiminde `RUSTUP_TOOLCHAIN`'i yener;
          # rustdoc'un `--output-format json` modu HALA nightly-only olduğundan
          # stable rustdoc crate-adımında kırılıyordu. Çözüm: gate adımına
          # RUSTUP_TOOLCHAIN=nightly (rust-toolchain.toml'u yener, hem current
          # hem baseline aynı nightly ile diff'lenir → tutarlı). MSRV yükümlülüğü
          # ayrı job'ların (build/test 1.94.0) sorumluluğunda kalır.
          RUSTUP_TOOLCHAIN: nightly
          CARGO_BUILD_JOBS: "2"
          RUSTFLAGS: "-C debuginfo=0"
        run: |
          set +e
          if [ -z "${SEMVER_BEFORE}" ] || [ "${SEMVER_BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            echo "BASE YOK (ilk push/şüpheli state) — gate atlanmaz, bilgi logu ile PASS."
            echo "NOT: budlum-core crates.io'da yayınlı değil; base mecburidir."
            exit 0
          fi
          bash ./current/scripts/check-semver.sh ./current ./baseline
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::warning::gate exit=$rc — runner memory snapshot (OOM kanıtı için):"
            free -m || true
          fi
          exit "$rc"
