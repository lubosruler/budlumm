name: Semver Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  semver-check:
    # CI Genişletme Madde 5: cargo-semver-checks.
    # Paylaşılan crate'lerde breaking API değişikliği tespit eder.
    name: Semver Check (Madde 5)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - name: cargo-semver-checks kur
        run: |
          cargo install cargo-semver-checks --locked
      - name: Semver check — budlum-core
        run: |
          cargo semver-checks check-release -p budlum-core 2>&1 | tee /tmp/semver-core.txt
        continue-on-error: true  # İlk aşamada sadece gözlem
      - name: Semver check — bud-vm
        run: |
          cargo semver-checks check-release -p bud-vm 2>&1 | tee /tmp/semver-budvm.txt
        continue-on-error: true
