name: Docker Smoke ()

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'config/mainnet.toml'
      - 'docker-compose.yml'
      - 'scripts/smoke_rpc.sh'
      - 'scripts/docker-smoke-mainnet.sh'
      - 'scripts/devnet-multinode-smoke.sh'
      - 'src/**'
      - '.github/workflows/docker-smoke.yml'  # G6: bu workflow degisince smoke+trivy tetiklensin
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# G5/G27: minimal permissions — bu workflow yalniz okur (build+scan+smoke).
permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build mainnet image
        run: docker build -t budlum-core:smoke-test -f Dockerfile .
      - name: İmza kanıtı — taranan imaj az önce BURADA build edilen
        run: |
          docker image inspect budlum-core:smoke-test --format 'taranan_imaj_id={{.Id}} boyut={{.Size}}byte'
      - name: Trivy IMAGE taramasi (G6/ADIM8 §3.9 — smoke imaji; CRITICAL/HIGH = fail)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: image
          image-ref: budlum-core:smoke-test
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Run RPC smoke (devnet)
        run: |
          chmod +x scripts/smoke_rpc.sh
          SMOKE_NETWORK=devnet SMOKE_RPC_PORT=18545 ./scripts/smoke_rpc.sh || (cat /tmp/budlum-smoke-db/node.log 2>/dev/null; exit 1)
      - name: Run Docker mainnet smoke
        run: |
          chmod +x scripts/docker-smoke-mainnet.sh
          ./scripts/docker-smoke-mainnet.sh || (docker logs budlum-mainnet-smoke-$$ 2>/dev/null; exit 1)

  devnet-multinode-smoke:
    name: Devnet Multi-Node Smoke (4x PoS mesh + metrics + operator-RPC izolasyon)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: 4-node compose smoke (mesh/liveness/metrics/RPC-izolasyon)
        run: |
          chmod +x scripts/devnet-multinode-smoke.sh
          ./scripts/devnet-multinode-smoke.sh || { docker compose -p budlum-multinode-smoke ps || true; docker compose -p budlum-multinode-smoke logs --tail=150 || true; exit 1; }
      - name: Teardown (her durumda)
        if: always()
        run: docker compose -p budlum-multinode-smoke down -v --remove-orphans || true
