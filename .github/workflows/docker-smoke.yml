name: Docker Smoke (Phase 3 §3.2)

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'config/mainnet.toml'
      - 'scripts/phase3_smoke_rpc.sh'
      - 'scripts/docker-smoke-mainnet.sh'
      - 'src/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build mainnet image
        run: docker build -t budlum-core:smoke-test -f Dockerfile .
      - name: Run RPC smoke (devnet)
        run: |
          chmod +x scripts/phase3_smoke_rpc.sh
          SMOKE_NETWORK=devnet SMOKE_RPC_PORT=18545 ./scripts/phase3_smoke_rpc.sh || (cat /tmp/budlum-phase3-smoke-db/node.log 2>/dev/null; exit 1)
      - name: Run Docker mainnet smoke
        run: |
          chmod +x scripts/docker-smoke-mainnet.sh
          ./scripts/docker-smoke-mainnet.sh || (docker logs budlum-mainnet-smoke-$$ 2>/dev/null; exit 1)
