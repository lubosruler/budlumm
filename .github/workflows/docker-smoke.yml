name: Docker Smoke (ADIM3 §3.2)

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'config/mainnet.toml'
      - 'scripts/adim3_smoke_rpc.sh'
      - 'scripts/docker-smoke-mainnet.sh'
      - 'src/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build mainnet image
        run: docker build -t budlum-core:smoke-test -f Dockerfile .
      - name: Run RPC smoke (devnet)
        run: |
          chmod +x scripts/adim3_smoke_rpc.sh
          SMOKE_NETWORK=devnet SMOKE_RPC_PORT=18545 ./scripts/adim3_smoke_rpc.sh || (cat /tmp/budlum-adim3-smoke-db/node.log 2>/dev/null; exit 1)
      - name: Run Docker mainnet smoke
        run: |
          chmod +x scripts/docker-smoke-mainnet.sh
          ./scripts/docker-smoke-mainnet.sh || (docker logs budlum-mainnet-smoke-$$ 2>/dev/null; exit 1)
