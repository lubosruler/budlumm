    # `cargo test` yeşil kalsa bile FAIL olur (vacuous-gate koruması, kanaryalı).
    name: B.U.D. E2E Invariants (9/9 isim-kilitli) ()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
