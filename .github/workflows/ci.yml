name: CI

on:
  push:
    branches: [main, "arena/**"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  budlum:
    name: Budlum Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          components: clippy, rustfmt
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.x"
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --lib --tests -- -D warnings
      - name: Test
        run: |
          set +e
          cargo test --lib --verbose 2>&1 | tee ci-test.log
          status=${PIPESTATUS[0]}
          if [[ $status -ne 0 && "${{ github.event_name }}" == "push" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ci-test.log
            git commit -m "ci: capture failing test log [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
          exit $status

  budzero:
    name: BudZero / BudZKVM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: budzero
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: budzero
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
