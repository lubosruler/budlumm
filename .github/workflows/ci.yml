      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - name: PoA izolasyon testleri (7 test, 5 sızma senaryosu)
        run: |
          cargo test --lib poa_isolation 2>&1 | tee /tmp/poa-isolation.txt
          N=$(grep -c "^test.*ok$" /tmp/poa-isolation.txt || true)
          echo "PoA izolasyon test sayısı: $N"
          if [ "$N" -lt 7 ]; then
            echo "FAIL: PoA izolasyon test sayısı 7'den az ($N)"
            exit 1
          fi

  dependency-audit:
    # : cargo audit + SBOM üretimi + SBOM artifact.
    name: Dependency Audit + SBOM ()
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo audit (CVE = fail)
        run: bash ./scripts/audit-deps.sh
      - name: SBOM üret (CycloneDX)
        run: bash ./scripts/generate-sbom.sh
      - name: SBOM artifact yükle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90

  cargo-deny:
    # : root ve budzero grafikleri ayrı matrix adımlarında denetlenir.
    name: Cargo Deny (${{ matrix.name }}) ()
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: root, manifest: "./Cargo.toml" }
          - { name: budzero, manifest: "budzero/Cargo.toml" }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: cargo deny check (advisories, bans, licenses, sources)
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          manifest-path: ${{ matrix.manifest }}
          command: check

  fuzz-quick:
    #  + : mevcut target'lar + 3 yeni (consensus/relayer/zk).
    # Uzun koşular fuzz-nightly.yml (schedule, 4h/target, corpus cache) işler.
    # Quick: 60s/target (10 target × 60s ≈ 10dk + build; timeout-minutes 60).
    name: Fuzz Quick (60s × 10 target) ()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust (nightly — cargo-fuzz gereksinimi)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: nightly
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
          shared-key: fuzz
      - name: Install cargo-fuzz
        run: cargo +nightly install --locked cargo-fuzz
      - name: Her target 90 saniye fuzz
        # cargo-fuzz, fuzz/Cargo.toml'u MEVCUT crate köküne göre çözer;
        # repo kökünden çalıştırılmalı (fuzz/ altından çağrı = fuzz/fuzz hatası).
        run: |
          set -euo pipefail
          targets=(
            block_deserialize
            consensus_validate
            fuzz_blockchain_serialize
            snapshot_deserialize
            transaction_deserialize
            consensus_state_transition
            reputation
            relayer_escrow
            zk_verifier
          )
          # Note: evm_rlp_decode + evm_mpt_verify remain nightly/manual (F10.1);
          # quick gate covers deserialize +  state/relayer/zk.
          for t in "${targets[@]}"; do
            echo "=== fuzz-quick: $t (60s) ==="
            cargo +nightly fuzz run "$t" -- -max_total_time=60 -timeout=25 -print_final_stats=1
          done
          echo "Tüm fuzz target'ları temiz."
      - name: Crash artifact (varsa)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-quick-crashes-${{ github.sha }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 30

  secret-scan:
    # : TAM git geçmişinde secret taraması (fetch-depth: 0).
    # gitleaks OSS binary'yi kullanıyoruz: resmi GitHub Action, organizasyon
    # repolarında GITLEAKS_LICENSE (dış kayıt) ister; binary aynı motoru
    # lisanssız çalıştırır. Sürüm + sha256 pinlidir. Resmi action'a geçiş,
    # lisans anahtarı temin edildiğinde değerlendirilebilir (güvenlik çıktısı
    # birebir aynıdır).
    name: Secret Scan (gitleaks, tam geçmiş) ()
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: gitleaks v8.30.1 kur (sürüm + sha256 pinli)
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Kanarya — gitleaks alarmının çalıştığının kanıtı
        run: |
          set -euo pipefail
          # DİKKAT: Sahte token asla tek parça olarak bu dosyaya yazılmaz;
          # parçalar çalışma zamanında birleştirilir. Aksi halde repo'nun
          # kendi geçmiş taraması bu kalıbı sızıntı sanıp FAIL eder.
          PFX="gh""p_"
          S1="xK9mQ2vR7pL4nT8w"
          S2="Y3zB6cF1hJ5sD0gE42uI"
          mkdir -p /tmp/gitleaks-canary
          cd /tmp/gitleaks-canary
          git init -q .
          printf 'example_key = "%s%s%s"\n' "$PFX" "$S1" "$S2" > canary.txt
          git add .
          git -c user.email=ci@budlum.xyz -c user.name=ci commit -qm canary
          if gitleaks detect --source . --redact --no-banner; then
            echo "HATA: gitleaks kanaryayı yakalayamadı → tarama güvenilmez (vacuous gate)!"
            exit 1
          fi
          echo "Kanarya yakalandı → gitleaks alarmı çalışıyor."
      - name: Tam geçmiş taraması (bulgu = fail)
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  timing-safe:
    # : RPC/crypto'da ham-eşitlik statik taraması + dudect-tarzı
    # istatistiksel zamanlama regresyon testi (cargo bench).
    name: Timing-Safe Regression ()
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: "1.94.0"
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Statik tarama + kanarya
        run: |
          bash ./scripts/check-timing-safe.sh
          bash ./scripts/check-timing-safe.sh --self-test
      - name: Dudect-tarzı istatistiksel zamanlama testi
        run: cargo bench --bench timing_safe

  docker-security:
    # : Dockerfile statik lint (hadolint) + repo fs trivy taramasi.
    # hadolint binary surum+sha256 pinli (gitleaks deseni). DL3008 (apt surum
    # pinleme) warning seviyesinde birakilir: bookworm apt churn'une karsi
    # bilincli kalibrasyon — failure-threshold: error ile yalniz error+ FAIL.
    name: Docker Security (trivy + hadolint) ()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: hadolint v2.14.0 kur (surum + sha256 pinli)
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64
          echo "6bf226944684f56c84dd014e8b979d27425c0148f61b3bd99bcc6f39e9dc5a47  /tmp/hadolint" | sha256sum -c -
          sudo install -m 0755 /tmp/hadolint /usr/local/bin/hadolint
          hadolint --version
      - name: Dockerfile lint (failure-threshold=error)
        run: hadolint --failure-threshold error Dockerfile
      - name: Trivy fs taramasi (secret + misconfig; CRITICAL/HIGH = fail)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  coverage:
    # : nextest + llvm-cov, ratchet kapisi (Q-7b1(a)).
    # Basline kaniti 2026-07-17: lines 64.15% (14493/22594), 531/531 PASS.
    # Araclar surum+sha256 pinli (nextest resmi .sha256 asset ile birebir dogrulanmis).
    name: Coverage (nextest + llvm-cov, ratchet) ()
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: "1.94.0"
          components: llvm-tools-preview
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo-llvm-cov v0.8.7 + nextest 0.9.140 kur (sha256 pinli)
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/clcov.tar.gz \
            https://github.com/taiki-e/cargo-llvm-cov/releases/download/v0.8.7/cargo-llvm-cov-x86_64-unknown-linux-gnu.tar.gz
          echo "9a75fe29538d3800b3da57f6f6efb64cba5c720a257bf0cb8b51f39d495a9168  /tmp/clcov.tar.gz" | sha256sum -c -
          cd /tmp
          curl -sSfLO https://github.com/nextest-rs/nextest/releases/download/cargo-nextest-0.9.140/cargo-nextest-0.9.140-x86_64-unknown-linux-gnu.tar.gz
          curl -sSfLO https://github.com/nextest-rs/nextest/releases/download/cargo-nextest-0.9.140/cargo-nextest-0.9.140-x86_64-unknown-linux-gnu.sha256
          sha256sum -c cargo-nextest-0.9.140-x86_64-unknown-linux-gnu.sha256
          cd -
          mkdir -p ~/.cargo/bin
          tar -xzf /tmp/clcov.tar.gz -C ~/.cargo/bin/
          tar -xzf /tmp/cargo-nextest-0.9.140-x86_64-unknown-linux-gnu.tar.gz -C ~/.cargo/bin/
          cargo llvm-cov --version && cargo nextest --version
      - name: Kapi kanaryasi (vacuous-gate korumasi)
        run: bash ./scripts/check-coverage.sh --self-test
      - name: Olcum + ratchet kapisi
        run: |
          mkdir -p coverage
          cargo llvm-cov nextest --lib --json --output-path coverage/cov.json
          bash ./scripts/check-coverage.sh coverage/cov.json
      - name: G4 modül analizi kanaryası (vacuous değil)
        run: python3 ./scripts/check_module_coverage.py --self-test
      - name: G4 modül coverage raporu — budlum (ADIM8.5 §4; baselines 2. adımda, vacuous-gate YOK)
        run: python3 ./scripts/check_module_coverage.py coverage/cov.json
      - name: BudZero coverage ölçümü (llvm-cov nextest, budzero workspace)
        run: |
          cd budzero
          cargo llvm-cov nextest --workspace --json --output-path ../coverage/budzero-cov.json
      - name: G4 modül coverage raporu — budzero (rapor modu)
        run: python3 ./scripts/check_module_coverage.py coverage/budzero-cov.json
      - name: Coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.sha }}
          path: coverage/   # cov.json + budzero-cov.json (G4 modul tabanlari bu artifact'ten)
          retention-days: 30

  repo-lint:
    # : actionlint + buf + genesis schema (tek birlesik statik kapi).
    # Araclar surum+sha256 pinli. buf breaking, main'de buf.yaml bulundugunda
    # aktiflesir (baseline bu dalgayla kuruluyor — ilk kosuda SKIP dürüst marker).
    # G27: zizmor workflow güvenlik lint'i de bu job'da (kanaryalı, 0-bulgu politikası).
    name: Repo Lint (actionlint + buf + genesis + zizmor) ( + G27)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: actionlint v1.7.12 kur (sha256 pinli)
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  /tmp/actionlint.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/actionlint.tar.gz -C /usr/local/bin actionlint
          actionlint --version
      - name: actionlint kapisi + kanarya
        run: |
          bash ./scripts/check-actionlint.sh --self-test
          bash ./scripts/check-actionlint.sh
      - name: zizmor kapisi + kanarya (G27)
        run: |
          bash ./scripts/check-zizmor.sh --self-test
          bash ./scripts/check-zizmor.sh
      - name: buf v1.71.0 kur (sha256 pinli)
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/buf \
            https://github.com/bufbuild/buf/releases/download/v1.71.0/buf-Linux-x86_64
          echo "d3de2838c68a5759ca276884254bc70df4e4ad185d6ed5f65f327b6ce6363eab  /tmp/buf" | sha256sum -c -
          sudo install -m 0755 /tmp/buf /usr/local/bin/buf
          buf --version
      - name: buf build + lint
        run: |
          set -o pipefail
          buf build
          buf lint
      - name: buf breaking — baseline varsa aktif ()
        run: |
          set -euo pipefail
          # main'de buf.yaml yoksa against-resolve "file deleted" yanilgisina duser;
          # baseline bu push'la kurulur → durust SKIP marker.
          # F8 fix (ARENAX 2026-07-17): non-main branch'lerde 'branch=main' ref yok → Repo Lint kırmızı.
          # Doğrusu 'origin/main' (GitHub docs: .git#branch=<remote>/<branch>).
          if git cat-file -e origin/main:buf.yaml 2>/dev/null; then
            buf breaking --against '.git#branch=origin/main'
            echo "buf breaking: main'e karsi temiz."
          else
            echo "SKIP (durust marker): main'de buf.yaml henuz yok — baseline bu dalgayla kuruluyor."
          fi
      - name: genesis schema kapisi + kanarya
        run: |
          python3 ./scripts/check_genesis_schema.py --self-test
          python3 ./scripts/check_genesis_schema.py config/mainnet-genesis.json
      - name:  spec coverage kapisi + kanarya
        run: |
          bash ./scripts/check-spec-coverage.sh --self-test
          bash ./scripts/check-spec-coverage.sh
