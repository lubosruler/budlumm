name: CI

on:
  push:
    branches: [main, "arena/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  budlum:
    name: Budlum Core
    runs-on: ubuntu-latest
    # Rozet self-commit'i (Q5, loop guard'lı) yalnız bu job'da write ister;
    # diğer tüm job'lar global minimalde (contents: read) kalır.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0  # zizmor: ignore[artipacked] rozet botu self-commit icin GITHUB_TOKEN kasitli
        with:
          persist-credentials: true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: "1.94.0"
          components: clippy, rustfmt
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy pedantic/nursery ratchet (izleme modu, G2)
        # ADIM8 3.3: uyarı gorunurlugu + sayi-artisina karsi ratchet (baseline 191,
        # kanit .github/clippy-extra-baseline.txt). Sifira indirme kademeli/azimli.
        run: |
          set -euo pipefail
          bash ./scripts/check-clippy-extra.sh --self-test
          cargo clippy --all-targets --message-format=json -- -W clippy::pedantic -W clippy::nursery > /tmp/clippy-extra.json 2>/dev/null || true
          bash ./scripts/check-clippy-extra.sh /tmp/clippy-extra.json
      - name: Feature matrix — pq-ml-dsa solo ()
        run: |
          set -euo pipefail
          cargo check --no-default-features --features pq-ml-dsa
          cargo clippy --no-default-features --features pq-ml-dsa --all-targets -- -D warnings
      - name: Feature canary — --all-features REDDEDILMELI ()
        run: |
          set -euo pipefail
          if cargo check --all-features 2>/dev/null; then
            echo "HATA: --all-features derlendi -> compile_error guard yok (vacuous gate!)"
            exit 1
          fi
          echo "Kanarya OK: --all-features beklendigi gibi compile_error ile rededildi (PQ backend'ler mutually exclusive)."
      - name: Test
        # pipefail zorunlu: tee tek başına exit 0 döner; aksi halde test fail
        # Core job'ı sahte-yeşil yapar (kanıt: d815561 Test=success, 1 fail gizli;
        # Coverage nextest aynı fail ile kırmızı — ARENA3 2026-07-19).
        run: |
          set -euo pipefail
          cargo test --lib --verbose 2>&1 | tee /tmp/libtests.log
      - name: cargo doc (Madde 6 — public API dokümantasyon)
        run: |
          set -euo pipefail
          RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --features pq-dilithium 2>&1 | tee /tmp/doc.log
          echo "cargo doc: warnings as errors — passed"
      - name: Test rozeti tazeleme — main push + sayi degisimi (/Q5)
        # Loop guard ×3 + KIRMIZI KORUMASI: success() AÇIK zorunlu — step-level `if:`
        # default success() kosulunu EZER (CI kanit: run a601dcf — ea27afd'nin KIRMIzI
        # test koşusundan 519 rozeti yazdı; step-level if success() ezmeseydi atlanırdı).
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BADGE_PUSH_TOKEN: ${{ secrets.BADGE_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          # Çift koruma: logda failure izi varsa rozet yazma (success() pratikte engeller).
          if grep -qE '[1-9][0-9]* failed' /tmp/libtests.log; then
            echo "FAIL: test koşusunda failure varken rozet güncellenmez"
            exit 1
          fi
          N=$(grep -oE '[0-9]+ passed' /tmp/libtests.log | tail -1 | grep -oE '^[0-9]+')
          [ -n "$N" ] || { echo "FAIL: test sayisi parse edilemedi (kapi guvenilmez)"; exit 1; }
          CUR=$(grep -oE 'tests-[0-9]+%20lib' README.md | head -1 || true)
          echo "rozet: $CUR -> tests-${N}%20lib"
          if [ "$CUR" = "tests-${N}%20lib" ]; then
            echo "ROZET GUNCEL — push yok (loop guard calisti)"
            exit 0
          fi
          sed -i -E "s/tests-[0-9]+%20lib/tests-${N}%20lib/" README.md
          if ! git diff --quiet README.md; then
            git config user.name "budlum-ci[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore(badge): tests rozeti -> ${N} lib (CI kanitli, ${GITHUB_SHA:0:7})"
            # B-RACE fix (ARENA3, 2026-07-17): koşu başladıktan sonra main'e inen
            # herhangi bir commit push'u non-fast-forward reddettiriyor ve job
            # SAHTE-kırmızı oluyordu (kanıt: aa9cfcd — 546/546 yeşil test, yalnız
            # rozet push reddi). Bounded retry: her denemede yeni başa reset +
            # rozeti yeniden hesapla. Rozet sed'i idempotent: araya giren başka
            # bir badge commit'i aynı sayıyı yazdıysa diff boş kalır ve push
            # "Everything up-to-date" ile temiz geçer.
            PUSH_OK=0
            # Branch-protection day-1 entegrasyonu (2026-07-18): main'e 15/15
            # zorunlu kontrol gelince GITHUB_TOKEN bypass edemiyor (kanit: rozet
            # commit 801d246 push reddi). Rozet yalniz CI-kanitli sayiyi yazar
            # (guvenilir), bu yuzden ona push icin admin-PAT secret'i verildi.
            PUSH_URL=""
            if [ -n "${BADGE_PUSH_TOKEN:-}" ]; then
              PUSH_URL="https://x-access-token:${BADGE_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
              echo "rozet push: admin-PAT kanali (branch-protection bypass)"
            else
              echo "UYARI: BADGE_PUSH_TOKEN yok — GITHUB_TOKEN denecek (protected main'de red beklenir)"
            fi
            for attempt in 1 2 3; do
              # extraheader gotcha: checkout persist-credentials GITHUB_TOKEN'i
              # http.extraheader ile zorlar ve URL-embedded PAT'i ezer (kanit:
              # 00f618a badge run — admin-PAT kanali acikken bile 'hook declined').
              # Tek komutluk derogasyon: extraheader'i temizle, URL PAT'i kullan.
              set +e
              if [ -n "$PUSH_URL" ]; then
                PUSH_ERR=$(git -c "http.https://github.com/.extraheader=" push "$PUSH_URL" HEAD:main 2>&1)
                PUSH_RC=$?
              else
                PUSH_ERR=$(git push 2>&1)
                PUSH_RC=$?
              fi
              set -e
              if [ "$PUSH_RC" = "0" ]; then
                PUSH_OK=1
                echo "rozet push'landi: $N (deneme $attempt)"
                break
              fi
              echo "push reddedildi (deneme $attempt, rc=$PUSH_RC):"
              echo "$PUSH_ERR" | tail -20
              echo "— yeni basta yeniden hesaplanacak"
              git fetch origin main
              git reset --hard origin/main
              sed -i -E "s/tests-[0-9]+%20lib/tests-${N}%20lib/" README.md
              if ! git diff --quiet README.md; then
                git add README.md
                git commit -m "chore(badge): tests rozeti -> ${N} lib (CI kanitli, ${GITHUB_SHA:0:7}, race-taze)"
              fi
              sleep 2
            done
            # MR-1 false-red fix (ARENA3, 2026-07-20): rozet KOZMETİK'tir.
            # BADGE_PUSH_TOKEN eksik/kesintili + protected main → push red gelmesi
            # tüm Budlum Core job'unu yanıltıcı-kırmızı yapıyordu (kanıt: 21ea24e
            # step 13 fail; tekrar ARENA4 13:18). Yukarıdaki test-failure gardı
            # ('grep failed → exit 1') ve parse-failure gardı AYNEN korunur;
            # yalnızca rozet-PUSH başarısızlığı artık job'u kırmızı yapmaz. Rozet
            # BADGE_PUSH_TOKEN mevcutken otomatik pushlanmaya devam eder.
            if [ "$PUSH_OK" = "1" ]; then
              echo "rozet push OK"
            else
              echo "UYARI (soft-fail, MR-1): rozet 3 denemede pushlanamadi — BADGE_PUSH_TOKEN eksik/kesintili veya protected main. Cekirdek testler gecti; rozet kozmetiktir, is kirmizi yapilmaz."
              exit 0
            fi
          fi

  budzero:
    name: BudZero / BudZKVM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: budzero
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        # NOT: master 2026-07-16+ `toolchain` input'unu ZORUNLU kiliyor
        # (CI kanit: job 87741629986 — "'toolchain' is a required input").
        with:
          toolchain: "1.94.0"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: budzero
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

