        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - name: Kapı kanaryası (vacuous değil kanıtı)
        run: bash ./scripts/check-bud-e2e.sh --self-test
      - name: bud_e2e — 9 invariant + 3 e2e (isim kanaryalı)
        run: |
          cargo test --lib bud_e2e 2>&1 | tee /tmp/bud-e2e.txt
          bash ./scripts/check-bud-e2e.sh /tmp/bud-e2e.txt

