# Geçici migrasyon yardımcısı (ARENA3, libp2p 0.55→0.56): dal üzerinde
# workflow_dispatch ile çalışır. Lock yeniler + cargo check çıktısını artifact
# olarak bırakır; yerel toolchain olmadan migrasyon iterasyonu için.
# NOT: bu dosya migrasyon bitince main'e PR ile girer ve işi bitince kaldırılır.
name: Migration Lockgen (libp2p 0.56)
on:
  push:
    branches: [arena3/libp2p-migration]
  workflow_dispatch:
    inputs:
      note:
        description: "tur notu"
        required: false

permissions:
  contents: read

jobs:
  lockgen:
    name: Lock update + cargo check (root + budzero)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-07-16
        with:
          toolchain: "1.94.0"
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
      - name: Root — lock update + check
        run: |
          set -x
          cargo update -p libp2p@0.55.0 --precise 0.56.0 --recursive || true
          cargo update -p libp2p-gossipsub --precise 0.49.4 || true
          cargo check --workspace --all-targets 2>&1 | tee /tmp/check-root.log || true
      - name: BudZero — lock update + check
        run: |
          set -x
          cd budzero
          cargo update -p libp2p@0.55.0 --precise 0.56.0 --recursive || true
          cargo update -p libp2p-gossipsub --precise 0.49.4 || true
          cargo check --workspace --all-targets 2>&1 | tee /tmp/check-budzero.log || true
      - name: Upload çıktılar
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lockgen-out
          retention-days: 3
          path: |
            Cargo.lock
            budzero/Cargo.lock
            /tmp/check-root.log
            /tmp/check-budzero.log
